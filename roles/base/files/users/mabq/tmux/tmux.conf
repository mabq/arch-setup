# Documentation:
#   - https://github.com/tmux/tmux/wiki/Getting-Started#configuring-tmux
#   - https://github.com/tmux/tmux/wiki/Getting-Started#list-of-useful-options
#   - https://github.com/tmux/tmux/wiki/Getting-Started#changing-options
#   - https://github.com/tmux/tmux/wiki/Getting-Started#key-bindings

# Notes:
#   This file is only run when the server is started or by reloding it manually via the `:source` command

# initial setup
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g status-keys vi

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set repeat-time 0

# reload config
bind r source-file ~/.config/tmux/tmux.conf

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# create new panes in the same working directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -hc "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"



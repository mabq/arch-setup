# -----------------------------------------------------------------------------
# Formats
#       https://github.com/tmux/tmux/wiki/Getting-Started#formats
# -----------------------------------------------------------------------------

set -g status-justify centre
set -g status-bg black
set -g status-fg colour35
set -g status-interval 60
set -g status-left-length 50
set -g status-left "#[bg=colour35]💻#[fg=colour234,bold] #H #[bg=colour234,nobold]#[fg=colour35] [#S] $tmux_target_lower "
set -g status-right '#[bg=colour234]#[fg=colour35]📈 #(cut -d " " -f 1-3 /proc/loadavg) #[bg=colour35]🕔 #[fg=colour234,bold]%H:%M '

# *********************************************************************************

# Options ---------------------------------------------------------------------

# session
set -g base-index 1 # windows indexes start from this instead of from 0
set -g display-time 2500 # the time in milliseconds for which messages on the status line are shown
set -g history-limit 10000 # the maximum number of lines kept in the history for each pane
set -g mouse on # enable mouse support
set -g set-titles on # tmux will set the title of the outside terminal
set -g status-keys "vi" # use vi-style keys

# server
set -sg escape-time 0 # the time tmux waits after receiving an Escape key to see if it is part of a longer key sequence
set set-clipboard on # attempt to set the external X clipboard

# window
set -g display-panes-time 3000 # the time in milliseconds the pane numbers are shown for `<Prefix> q`
set -g mode-keys "vi" # use vi-style keys
setw -g pane-base-index 1 # Start windows at 1 (not 0)

# styles and format options
set -g status-right "" # remove host, date and time from status-line
set -g status-style "bg=#31748f fg=#e0def4" # The style of the status line as a whole, parts may be overridden by more specific options like `status-left-style`
set -g window-status-separator "  " # separator between windows in the window list

# correct colors
set -sa terminal-overrides ",alacritty:Tc"
set -g default-terminal "tmux-256color"

# correct terminal emulator window titles when using ssh
set -g set-titles-string "#T"



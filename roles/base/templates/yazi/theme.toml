[select]

border   = { fg = "{{ color_blue }}" }
active   = { fg = "{{ color_cyan }}" }
inactive = {}


[input]

border   = { fg = "{{ color_blue }}" }
title    = {}
value    = {}
selected = { reversed = true }


[completion]

border   = { fg = "{{ color_blue }}" }
active   = { bg = "{{ color_highlight }}" }
inactive = {}


[tasks]

border  = { fg = "{{ color_blue }}" }
title   = {}
hovered = { underline = true }


[which]

mask            = { bg = "{{ color_cyan }}" }
cand            = { fg = "{{ color_blue }}" }
rest            = { fg = "{{ color_white }}" }
desc            = { fg = "{{ color_white }}" }
separator       = "  "
separator_style = { fg = "{{ color_highlight_high }}" }


[help]

on      = { fg = "{{ color_cyan }}" }
exec    = { fg = "{{ color_blue }}" }
desc    = { fg = "{{ color_white }}" }
hovered = { bg = "{{ color_highlight }}", bold = true }
footer  = { fg = "{{ color_white_high }}", bg = "{{ color_highlight_high }}" }



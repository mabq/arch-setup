# default theme:
#   https://github.com/sxyazi/yazi/blob/main/yazi-config/preset/theme.toml


[manager]

cwd = { fg = "{{ color_blue }}" }

hovered = { fg = "{{ color_white_high }}", bg = "{{ color_black }}" }
preview_hovered = { fg = "{{ color_white_high }}" }

find_keyword = { fg = "{{ color_yellow }}", italic = true }
find_position = { fg = "{{ color_yellow }}", italic = true }

marker_selected = { fg = "{{ color_blue }}", bg = "{{ color_blue }}" }
marker_copied = { fg = "{{ color_yellow }}", bg = "{{ color_yellow }}" }
marker_cut  = { fg = "{{ color_cyan }}", bg = "{{ color_cyan }}" }

tab_active = { fg = "{{ color_white_high }}", bg = "{{ color_black_low }}", bold = true }
tab_inactive = { fg = "{{ color_white_low }}", bg = "{{ color_black_low }}" }
tab_width = 2

border_symbol = "│"
border_style = { fg = "{{ color_highlight_low }}" }

folder_offset  = [ 1, 0, 1, 0 ]
preview_offset = [ 1, 1, 1, 1 ]

syntect_theme = ""




# For more info see:
#   - `man tmux`
#   - https://github.com/tmux/tmux/wiki/Getting-Started

# Inspiration:
#   - https://github.com/LearnLinuxTV/personal_ansible_desktop_configs/blob/main/roles/base/files/users/jay/tmux/tmux.conf.workstation
#   - https://github.com/ThePrimeagen/.dotfiles/blob/master/tmux/.tmux.conf


# keybindings ------------------------------------------------------------------

# change the prefix key
set -g prefix C-space
unbind C-b
bind C-space send-prefix

# easier reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# vim-like selection and copy
bind -T copy-mode-vi "v" send-keys -X begin-selection
bind -T copy-mode-vi "y" send-keys -X copy-selection-and-cancel

# take me there quickly (tmux-sessionizer - user uppercase letters!)
bind W run-shell "~/.local/bin/tmux-sessionizer ~/projects/ansible/ansible-archlinux-workstation/"
bind L run-shell "~/.local/bin/tmux-sessionizer ~/projects/learning/"
bind D run-shell "~/.local/bin/tmux-sessionizer ~/dotfiles"

# easier window switch and swap (no prefix required)
bind -n M-"," select-window -p
bind -n M-"." select-window -n
bind -n M-S-"," swap-window -t -1
bind -n M-S-"." swap-window -t +1

# easier pane selection
#   (pane navigation is being given priotity over `select last window` Ctrl-l)
#   (use default `;` to select last pane)
#   (use default `q` to select pane by number)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# use current working directory for new panes and windows
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -hc "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"


# options ----------------------------------------------------------------------

set -g mouse on

set -g default-terminal "tmux-256color"

{% if 'workstation' in group_names %}
set -ga terminal-overrides ",{{ terminal }}:Tc"    # correct colors
{% endif %}

set -g mode-keys "vi"    # for copy-mode
set -g status-keys "vi"    # for the command prompt

set -g monitor-activity on
set -g visual-activity on

set -g set-clipboard on

set -g escape-time 0
set -g repeat-time 350    # shorten time to be able to start typing sooner
set -g display-time 5000
set -g display-panes-time 10000

set -g history-limit 10000
set -g buffer-limit 10

set -g base-index 1
set -g pane-base-index 1

set -g renumber-windows on    # manually with `:movew -r`
set -g automatic-rename on

set -g set-titles on
set -g set-titles-string "#T"    # correct terminal emulator window titles when using ssh


# style and format ------------------------------------------------------------- 

#   (https://github.com/tmux/tmux/wiki/Getting-Started#list-of-style-and-format-options)

set -g pane-active-border-style "fg={{ sel_high }}"
set -g pane-border-style "fg={{ bg_low }}"

set -g message-style "bg={{ yellow }},fg={{ bg_medium }}"
set -g message-command-style "bg={{ yellow }},fg={{ bg_medium }}"

set -g mode-style "bg={{ yellow }},fg={{ bg_high }}"    # selection style

set -g display-panes-active-colour "{{ blue }}"    # active pane number color
set -g display-panes-colour "{{ red }}"    # inactive pane number color

set -g status-style "fg={{ fg_high }},bg={{ bg_medium }}"

set -g status-left "[#S]"
set -g status-left-style "fg={{ cyan }}"
set -g status-left-length 100    # automatically trucated if space is required

set -g status-justify "absolute-centre"
set -g window-status-style "fg={{ fg_low }}"
set -g window-status-current-style "fg={{ fg_high }}"
set -g window-status-separator "   "
# set -g window-status-format " #I:#W#{?window_flags,#{window_flags}, } "
# set -g window-status-current-format " #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-activity-style "fg={{ blue }}"

set -g status-right ""    # remove clock and hostname info


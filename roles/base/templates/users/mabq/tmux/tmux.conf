# Options ----------------------------------------------------------------------


set -g mouse on
set -ga terminal-overrides ",alacritty:Tc" # corrent colors
set -g default-terminal "tmux-256color" # must be `tmux` (https://unix.stackexchange.com/questions/745710/getting-italics-working-correctly-in-tmux)
# set -g mode-keys "vi"   # for copy-mode only
# set -g monitor-activity on
# set -g visual-activity on
# set -g set-clipboard on
# set -g repeat-time 0
set -g display-panes-time 4000
# set -g buffer-limit 10
# set -g base-index 1
# set -g pane-base-index 1
# set -g renumber-windows on # manually with `:movew -r`
# set -g automatic-rename on
# set -g set-titles on
# set -g set-titles-string "#T" # correct terminal emulator window titles when using ssh


# tmux-sensible keybindings ----------------------------------------------------
#   https://github.com/tmux-plugins/tmux-sensible#key-bindings

bind C-p previous-window
bind C-n next-window

bind a last-window

bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux configuration reloaded"


# my keybindings ---------------------------------------------------------------

# change the prefix key
set -g prefix C-space
unbind C-b
bind C-space send-prefix

# vim-like selection and copy

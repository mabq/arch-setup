# style and format ------------------------------------------------------------- 
#   https://github.com/tmux/tmux/wiki/Getting-Started#list-of-style-and-format-options

set -g pane-active-border-style "fg={{ color_green }}"
set -g pane-border-style "fg={{ color_black_high }}"

set -g message-style "bg={{ color_yellow }},fg={{ color_black }}"
set -g message-command-style "bg={{ color_yellow }},fg={{ color_black }}"

set -g mode-style "bg={{ color_yellow }},fg={{ color_black_low }}"    # selection style

set -g display-panes-active-colour "{{ color_blue }}"    # active pane number color
set -g display-panes-colour "{{ color_red }}"    # inactive pane number color

set -g status-style "fg={{ color_white_high }},bg={{ color_black }}"

set -g status-left "[#S]"
set -g status-left-style "fg={{ color_cyan }}"
set -g status-left-length 100    # automatically trucated if space is required

set -g status-justify "absolute-centre"
set -g window-status-style "fg={{ color_white_low }}"
set -g window-status-current-style "fg={{ color_white_high }}"
set -g window-status-separator "   "
# set -g window-status-format " #I:#W#{?window_flags,#{window_flags}, } "
# set -g window-status-current-format " #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-activity-style "fg={{ color_blue }}"

set -g status-right ""    # remove clock and hostname info


# tmux plugin manager ----------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'

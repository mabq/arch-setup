#
#
# Notes:
#   - Must install plugins manually with `{prefix} Ctrl-I` (uppercase i)
#   - List all key bindings with `{prefix}-?`
#   - All credits to https://www.youtube.com/watch?v=DzNmUNvnB04
#
# Requirements:
#   - tmux-sessionizer (mappings must be set in zsh and neovim)
#   - tpm
#
# ------------------------------------------------------------------------------

# Use space as the prefix key
unbind-key C-b
set -g prefix C-space
bind-key C-space send-prefix

# Correct colors (`-a` appends, does not replace)
set -ga terminal-overrides ",alacritty:Tc"

# Correct italics highlight issue (https://unix.stackexchange.com/questions/745710/getting-italics-working-correctly-in-tmux)
set-option -g default-terminal "tmux-256color"

# Enable mouse support
set -g mouse on

# Increase pane display time (default 750)
set -g display-panes-time 3000

# Start windows and panes at 1 (default 0)
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Easier session switching
bind-key -n M-j  switch-client -p
bind-key -n M-k switch-client -n

# Easier window switching and swaping
bind-key -n M-h  previous-window
bind-key -n M-l next-window
bind-key M-h "swap-window -s -1; previous-window"
bind-key M-l "swap-window -s +1; next-window"

# Vim-like copy mode
set -g mode-keys "vi"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Use the current working directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Easier reload
bind-key R run-shell "tmux source-file $HOME/.config/tmux/tmux.conf; tmux display-message 'Tmux configuration reloaded'"

# tmux-sessioniner
#   Fundamental for super easy session creation (see script notes)
#   Additionally, it can be used to focus on a project with a single keystroke:
#     (use uppercase letters only)
#     (try not to overwrite default keybindings)
# bind L run-shell "~/.config/tmux/scripts/tmux-sessionizer.sh ~/projects/learning/"
# bind D run-shell "~/.config/tmux/scripts/tmux-sessionizer.sh ~/dotfiles"
# bind S run-shell ~/.config/tmux/scripts/tmux-sessionizer.sh ~/projects/ansible-setup/"
# bind A run-shell ~/.config/tmux/scripts/tmux-sessionizer.sh ~/projects/ansible-archlinux/"

# Plugins
#   See https://github.com/tmux-plugins
#   All plugings are stored in `~/.config/tmux/plugins/`
set -g @plugin 'tmux-plugins/tpm'  # use `{prefix }}-I` to install, `{prefix}-U` to update and `{prefix}-alt-U` to remove
set -g @plugin 'tmux-plugins/tmux-sensible'  # won't replace any predifined options
set -g @plugin 'christoomey/vim-tmux-navigator'  # works together with the neovim plugin
set -g @plugin 'tmux-plugins/tmux-resurrect'  # use `{prefix }} C-s` to save and `{prefix} C-r` to resurect
run '~/.tmux/plugins/tpm/tpm'

# Theme (https://github.com/tmux/tmux/wiki/Getting-Started#list-of-style-and-format-options)
set -g status-justify "absolute-centre"  # center window labels
set -g status-style "bg={{ COLOR_BLACK_LOW }},fg={{ COLOR_WHITE_LOW }},italics"  # use fg for separators color

set -g status-left "   #S" 
set -g status-left-style "fg={{ COLOR_YELLOW }}"
set -g status-left-length 100  # automatically trucated if space is required

set -g window-status-separator ""
set -g window-status-format " #W "  # remove flags
# set -g window-status-format " #I:#W#{?window_flags,#{window_flags }}, } "
# set -g window-status-style "fg={{ COLOR_WHITE_LOW }}"  # default window style
set -g window-status-current-format " #W "  # remove flags
# set -g window-status-current-format " #I:#W#{?window_flags,#{window_flags }}, } "
set -g window-status-current-style "fg={{ COLOR_WHITE_HIGH }},bright"
set -g window-status-activity-style "fg={{ COLOR_RED }}"
set -g window-status-bell-style "fg={{ COLOR_RED }}"
set -g automatic-rename off  # do not let programs change the window name

set -g status-right ""  # remove clock and hostname info

set -g pane-border-style "fg={{ COLOR_BLACK_HIGH }}"
set -g pane-active-border-style "fg={{ COLOR_YELLOW }}"

set -g message-style "bg={{ COLOR_YELLOW }},fg={{ COLOR_BLACK_LOW }}"
# set -g message-command-style "bg={{ COLOR_BLUE }},fg={{ COLOR_BLACK_LOW }}"   # not used with emacs-like keys

set -g mode-style "bg={{ COLOR_HIGHLIGHT }},fg={{ COLOR_WHITE_HIGH }}"   # selection style

set -g display-panes-colour "{{ COLOR_RED }}"   # inactive pane number color
set -g display-panes-active-colour "{{ COLOR_BLUE }}"   # active pane number color


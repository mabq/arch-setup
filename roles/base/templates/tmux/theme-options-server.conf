# Theme options ---
#   https://github.com/tmux/tmux/wiki/Getting-Started#list-of-style-and-format-options

#   The linux console only supports 16 colors (use names, no hex values), has no support for nerdfonts or italics

set -g status-justify "absolute-centre"  # center window labels
set -g status-style "bg=black,fg=white"  # use fg for separators color

set -g status-left " #S"
set -g status-left-style "fg=yellow"
set -g status-left-length 100  # automatically trucated if space is required

set -g window-status-separator " "

set -g window-status-format " #I "
# set -g window-status-format " #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-style "fg=brightblack"

set -g window-status-current-format " #I "
# set -g window-status-current-format " #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-current-style "fg=white"

set -g window-status-activity-style "fg=red"
set -g window-status-bell-style "fg=red"
set -g automatic-rename off  # do not let programs change the window name

# set -g status-right "" # remove clock and hostname info

set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=yellow"

set -g message-style "bg=yellow,fg=black"
# set -g message-command-style "bg=yellow,fg=black"  # not used with emacs-like keys

set -g mode-style "bg=cyan,fg=black"  # selection style

set -g display-panes-colour "red"  # inactive pane number color
set -g display-panes-active-colour "green"  # active pane number color


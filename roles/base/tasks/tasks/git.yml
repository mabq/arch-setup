- name: git - create config file from template
  tags: dotfiles,git
  ansible.builtin.template:
    src: "git/.gitconfig"
    dest: "{{ home }}"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"

- name: git - install
  tags: install,git
  ansible.builtin.package:
    state: latest
    name:
      - git  # The fast distributed version control system
      - git-delta  # Syntax-highlighting pager for git and diff output

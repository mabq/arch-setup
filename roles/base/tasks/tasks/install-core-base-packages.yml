- tags: install,core_base_packages
  block:

  - name: install-core-base-packages - core-utils
    package:
      state: latest
      name:
        # - age                 # A simple, modern and secure file encryption tool
        # - at                  # AT and batch delayed command scheduling utility and daemon
        - bat                 # Cat clone with syntax highlighting and git integration (rust)
        - eza                 # Modern replacement for ls (community fork of exa) (rust)
        - fd                  # Simple, fast and user-friendly alternative to find (rust)
        - fzf                 # Command-line fuzzy finder
        - man-db              # A utility for reading man pages 
        - man-pages           # Linux man pages
        - ripgrep             # A search tool that combines the usability of ag with the raw speed of grep (rust)
        - ripgrep-all         # rga: ripgrep, but also search in PDFs, E-Books, Office documents, zip, tar.gz, etc.
        - tldr                # Command line client for tldr, a collection of simplified and community-driven man pages
        - which               # A utility to show the full path of commands
        - zoxide              # A smarter cd command for your terminal

  - name: install-core-base-packages - archlinux utils
    package:
      state: latest
      name:
        - base-devel          # Basic tools to build Arch Linux packages
        - pacman-contrib      # Contributed scripts and tools for pacman systems

  - name: install-core-base-packages - system monitor
    package:
      state: latest
      name:
        # - btop                # A monitor of system resources, bpytop ported to C++
        # - iotop               # View I/O usage of processes
        # - lm_sensors          # Collection of user space tools for general SMBus access and hardware monitoring
        # - lsof                # Lists open files for running Unix processes
        - htop                # Interactive process viewer
        - inxi                # Full featured CLI system information tool
        - neofetch            # A CLI system information tool written in BASH that supports displaying images.

  - name: install-core-base-packages - disk
    package:
      state: latest
      name:
        # - udiskie             # Removable disk automounter using udisks
        - dosfstools          # DOS filesystem utilities
        - duf                 # Disk Usage/Free Utility
        - exfatprogs          # exFAT filesystem userspace utilities for the Linux Kernel exfat driver
        - mtools              # A collection of utilities to access MS-DOS disks
        - ncdu                # Disk usage analyzer with an ncurses interface

  - name: install-core-base-packages - network
    package:
      state: latest
      name:
        # - bind-tools          # A complete, highly portable implementation of the DNS protocol
        # - nfs-utils           # Support programs for Network File Systems
        # - nmap                # Utility for network discovery and security auditing (great to check open ports)
        # - opensnitch          # A GNU/Linux application firewall
        # - traceroute          # Tracks the route taken by packets over an IP network
        # - ufw                 # Uncomplicated and easy to use CLI tool for managing a netfilter firewall
        # - wget                # Network utility to retrieve files from the Web
        # - whois               # Intelligent WHOIS client
        - curl                # Command line tool and library for transferring data with URLs
        - rsync               # A fast and versatile file copying tool for remote and local files


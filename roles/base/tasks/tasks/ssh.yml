- name: Configure client
  tags: dotfiles,ssh
  block:
  - name: ssh client - ensure `.ssh` directory exists
    ansible.builtin.file:
      path: "{{ home }}/.ssh"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: 0700
      state: directory
  - name: ssh client - install ssh keys and client config file
    ansible.builtin.copy:
      src: "ssh/{{ item.src }}"
      dest: "{{ home }}/.ssh"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: "{{ item.mode }}"
    with_items:
      - { src: 'id_ed25519', mode: '0600' }
      - { src: 'id_ed25519.pub', mode: '0644' }
      - { src: 'config', mode: '0600' }

- name: Cofigure server
  tags: dotfiles,ssh
  block:
  - name: ssh server - add public key to authorized_keys
    # access any machine from any other machine (single pair of keys)
    ansible.posix.authorized_key:
      user: "{{ user }}"
      key: "{{ lookup('file', '{{ home }}/.ssh/id_ed25519.pub') }}"
  - name: ssh server - disable password authentication for all users
    ansible.builtin.lineinfile:
      dest: /etc/ssh/sshd_config
      regexp: '{{ item.regex }}'
      line: '{{ item.line }}'
    loop:
      - { regex: "^#PermitRootLogin", line: "PermitRootLogin prohibit-password" }
      - { regex: "^#PasswordAuthentication", line: "PasswordAuthentication no" }

- name: Install
  tags: install,ssh
  block:
  - name: ssh install - install openssh
    ansible.builtin.package:
      name: openssh
      state: latest
  - name: ssh - enable and start the `sshd.service` as a 'system' service
    ansible.builtin.systemd_service:
      name: "sshd.service"
      enabled: true
      state: "started"
      scope: "system"

- name: Configure ssh-agent
  # https://wiki.archlinux.org/title/SSH_keys#Start_ssh-agent_with_systemd_user
  tags: install,ssh
  block:
  - name: ssh - enable and start the `ssh-agent.service` as a 'user' service
    # must be false to activate a user service
    become: false
    ansible.builtin.systemd_service:
      name: "ssh-agent.service"
      enabled: true
      state: "started"
      scope: "user"
    environment:
      # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/systemd_service_module.html#parameter-scope
      XDG_RUNTIME_DIR: "{{ xdg_runtime_dir }}"
  - name: ssh - add `SSH_AUTH_SOCK` as a systemd user environment variable
    # https://wiki.archlinux.org/title/Environment_variables#Per_user
    # https://wiki.archlinux.org/title/Systemd/User#Environment_variables
    block:
    - name: ssh - ensure `~/.config/environment.d` directory exists
      ansible.builtin.file:
        path: "{{ home }}/.config/environment.d"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: 0700
        state: directory
    - name: ssh - add `SSH_AUTH_SOCK` as a systemd user environment variable 
      ansible.builtin.copy:
        content: 'export SSH_AUTH_SOCK="$XDG_RUNTIME_DIR/ssh-agent.socket"'
        dest: "{{ home }}/.config/environment.d/ssh-agent.conf"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0600"


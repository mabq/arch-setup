# --- install packages

- name: base | software | neovim | install neovim
  tags: software,neovim
  ansible.builtin.package:
    state: latest
    name: 
      - neovim  # Fork of Vim aiming to improve user experience, plugins, and GUIs

# --- link config files

- name: base | software | neovim | ensure directories
  tags: software,neovim
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0755
    state: directory
  with_items:
    - { path: '{{ home }}/.config/nvim/lua/mabq' }
    - { path: '{{ home }}/.config/nvim/after/plugin' }
    - { path: '{{ home }}/.config/nvim/spell' }

- name: base | software | neovim | link config files
  tags: software,neovim
  ansible.builtin.file:
    src: "{{ srcdir }}/roles/base/links/neovim/{{ item.src }}"
    path: "{{ home }}/.config/nvim/{{ item.path }}"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0644
    state: "link"
  with_items:
    # main
    - { src: 'lua/init.lua', path: 'lua/mabq/init.lua' }
    - { src: 'lua/lazy.lua', path: 'lua/mabq/lazy.lua' }
    - { src: 'lua/remap.lua', path: 'lua/mabq/remap.lua' }
    - { src: 'lua/set.lua', path: 'lua/mabq/set.lua' }
    # plugins
    - { src: 'plugin/comment.lua', path: 'after/plugin/comment.lua' }
    - { src: 'plugin/harpoon.lua', path: 'after/plugin/harpoon.lua' }
    - { src: 'plugin/highlight-yank.lua', path: 'after/plugin/highlight-yank.lua' }
    - { src: 'plugin/lsp.lua', path: 'after/plugin/lsp.lua' }
    - { src: 'plugin/rose-pine.lua', path: 'after/plugin/rose-pine.lua' }
    - { src: 'plugin/telescope.lua', path: 'after/plugin/telescope.lua' }
    - { src: 'plugin/treesitter.lua', path: 'after/plugin/treesitter.lua' }
    - { src: 'plugin/undotree.lua', path: 'after/plugin/undotree.lua' }
    # spell
    - { src: 'spell/en.utf-8.add', path: 'spell/en.utf-8.add' }


- name: base | system | clock | start and enable `systemd-timesyncd.service`
  tags: system_setup,clock
  ansible.builtin.service:
    name: "systemd-timesyncd.service"
    enabled: true
    state: "started"
    scope: "system"

- name: base | system | clock | set timezone
  tags: system_setup,clock
  community.general.timezone:
    name: "{{ timezone }}"


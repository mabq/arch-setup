- name: clock - start and enable `systemd-timesyncd.service`
  tags: system,clock
  ansible.builtin.service:
    name: "systemd-timesyncd.service"
    enabled: true
    state: "started"
    scope: "system"

- name: clock | set time zone
  tags: system,clock,timezone
  community.general.timezone:
    name: "{{ timezone }}"


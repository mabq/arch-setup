- name: base | users | mabq | include variables
  # the user password is stored in an encrypted variable
  tags: always
  include_vars: users/mabq.yml


# --- create user account

- tags: mabq_create
  block:

  - name: base | users | mabq | create group
    ansible.builtin.group:
      name: mabq

  - name: base | users | mabq | generate password hash
    # cannot use the `passwd` command via Ansible, therefore we must manually hash
    # the password, the `-6` flag corresponds to the sha512 algorithm.
    # for more info visit:
    #   - https://wiki.archlinux.org/title/SHA_password_hashes
    #   - https://www.slashroot.in/how-are-passwords-stored-linux-understanding-hashing-shadow-utils
    #   - https://www.baeldung.com/linux/shadow-passwords#3-crypt-and-encryption-algorithms
    ansible.builtin.command: "openssl passwd -6 {{ password }}"
    register: password_hash

  - name: base | users | mabq | create user
    ansible.builtin.user:
      name: mabq
      # primary group
      group: mabq
      # supplementary groups --- https://wiki.archlinux.org/title/Users_and_groups#Group_list
      groups: adm,wheel
      # `/etc/shadow` stores passwords hashes (sha512)
      password: "{{ password_hash.stdout }}"
      # in order to be able to log in, the login shell must be one of those listed in `/etc/shells`
      shell: /bin/bash

  - name: base | users | mabq | create sudoers file
    ansible.builtin.copy:
      src: users/mabq/sudo/sudoers
      # https://wiki.archlinux.org/title/Sudo#Configure_sudo_using_drop-in_files_in_/etc/sudoers.d
      dest: /etc/sudoers.d/mabq
      owner: root
      group: root
      mode: 0440


# --- dotfiles

- tags: mabq_ssh
  block:

  # - name: base | users | mabq | dotfiles | ssh 
  #   ansible.builtin.file:
  #     path: /home/mabq/.ssh
  #     state: directory
  #     owner: mabq
  #     group: mabq
  #     mode: 0700

  - name: base | users | mabq | ssh | copy private and public keys
    ansible.builtin.copy:
      src: "{{ item.src }}"
      dest: "{{ item.dest }}"
      owner: mabq
      group: mabq
      mode: "{{ item.mode }}"
    with_items:
      - { src: 'users/mabq/ssh/id_ed25519', dest: '/home/mabq/.ssh/', mode: '0600' }
      - { src: 'users/mabq/ssh/id_ed25519.pub', dest: '/home/mabq/.ssh/', mode: '0640' }



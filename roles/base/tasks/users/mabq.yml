- name: base | users | mabq | include variables
  # the user password is stored in a variable encrypted
  tags: always
  include_vars: users/mabq.yml


# --- create user account

- name: base | users | mabq | create group
  tags: groups,mabq,users
  ansible.builtin.group:
    name: mabq

- name: base | users | mabq | generate password hash
  tags: users,mabq,sudo
  # cannot use the `passwd` command via Ansible, therefore we must manually hash
  # the password, the `-6` flag corresponds to the sha512 algorithm.
  # https://wiki.archlinux.org/title/SHA_password_hashes
  # https://www.slashroot.in/how-are-passwords-stored-linux-understanding-hashing-shadow-utils
  ansible.builtin.command: "openssl passwd -6 {{ password }}"
  register: password_hash

- name: base | users | mabq | create user
  tags: users,mabq,sudo
  ansible.builtin.user:
    name: mabq
    # primary group
    group: mabq
    # supplementary groups (see https://wiki.archlinux.org/title/Users_and_groups#Group_list)
    groups: adm,wheel
    # `/etc/shadow` stores passwords hashes (sha512)
    password: "{{ password_hash.stdout }}"
    # in order to be able to log in, the login shell must be one of those listed in `/etc/shells`
    shell: /bin/bash

- name: base | users | mabq | add sudoers file
  tags: users,mabq,sudo
  ansible.builtin.copy:
    src: users/mabq/sudo/sudoers
    # https://wiki.archlinux.org/title/Sudo#Configure_sudo_using_drop-in_files_in_/etc/sudoers.d
    dest: /etc/sudoers.d/mabq
    owner: root
    group: root
    mode: 0440


# --- setup ssh keys

- name: base | users | mabq | create `~/.ssh` directory
  tags: users,mabq,dotfiles,ssh
  ansible.builtin.file:
    path: /home/mabq/.ssh
    state: directory
    owner: mabq
    group: mabq
    mode: 0700

- name: base | users | mabq | setup authorized keys
  # because we use a single ssh key for all services this step authorizes each machines to access every other machine, they all share the same private and public keys
  tags: users,mabq,dotfiles,ssh
  ansible.posix.authorized_key:
    user: mabq
    # the key must be provided as a string 
    key: "{{ item }}"
  with_file:
    - users/mabq/ssh/id_ed25519.pub

- name: base | users | mabq | copy ssh keys
  tags: users,mabq,dotfiles,ssh
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/home/mabq/{{ item.dest }}"
    owner: mabq
    group: mabq
    mode: "{{ item.mode | default('0600') }}"
  with_items:
    - { src: 'users/mabq/ssh/id_ed25519', dest: '.ssh/id_ed25519' }
    - { src: 'users/mabq/ssh/id_ed25519.pub', dest: '.ssh/id_ed25519.pub', mode: '0640' }


# --- copy dotfiles

- name: "mabq - create config directories"
  tags: users,mabq,dotfiles
  file:
    path: /home/mabq/{{ item.dir }}
    state: directory
    owner: "mabq"
    group: "mabq"
    mode: 0700
  with_items:
    - { dir: '.bash' }
    - { dir: '.config' }
    - { dir: '.config/joshuto' }
    - { dir: '.config/tmux' }
    - { dir: '.config/zsh' }
    - { dir: '.cache' }
    - { dir: '.cache/zsh' }    # for zsh history
    - { dir: '.local' }
    - { dir: '.local/bin' }
    - { dir: '.ssh' }
      # neovim

# ---

- name: "mabq - add ssh public key to `~/.ssh/authorized_keys`"
  # by using a single key, this step authorizes each machine to access all other machines
  tags: users,mabq,dotfiles
  ansible.posix.authorized_key:
    user: "mabq"
    key: "{{ item }}"
  with_file:
    - "users/mabq/ssh/id_ed25519.pub"


- name: "mabq - copy dotfiles"
  tags: users,mabq,dotfiles
  ansible.builtin.copy:
    src: "users/mabq/{{ item.src }}"
    dest: "/home/mabq/{{ item.dest }}"
    owner: "mabq"
    group: "mabq"
    mode: "{{ item.mode | default('0600') }}"
  with_items:
    # ssh
    - { src: 'ssh/id_ed25519',              dest: '.ssh/id_ed25519' }
    - { src: 'ssh/id_ed25519.pub',          dest: '.ssh/id_ed25519.pub',              mode: '0640' }
    # git
    - { src: 'git/gitconfig',               dest: '.gitconfig' }
    # joshuto
    - { src: 'joshuto/joshuto.toml',        dest: '.config/joshuto/joshuto.toml' }
    - { src: 'joshuto/keymap.toml',         dest: '.config/joshuto/keymap.toml' }
    - { src: 'joshuto/mimetype.toml',       dest: '.config/joshuto/mimetype.toml' }
    - { src: 'joshuto/theme.toml',          dest: '.config/joshuto/theme.toml' }
    - { src: 'joshuto/icons.toml',          dest: '.config/joshuto/icons.toml' }
    - { src: 'joshuto/preview_file.sh',     dest: '.config/joshuto/preview_file.sh',       mode: '0700'}
    # tmux
    - { src: 'tmux/tmux-sessionizer',       dest: '.local/bin/tmux-sessionizer',      mode: '0700' }
    # zsh
    - { src: 'zsh/.zshenv',                 dest: '.zshenv' }
    - { src: 'zsh/.zshrc',                  dest: '.config/zsh/.zshrc' }
    - { src: 'zsh/bindkey.zsh',             dest: '.config/zsh/bindkey.zsh' }
    - { src: 'zsh/functions.zsh',           dest: '.config/zsh/functions.zsh' }
    - { src: 'zsh/options.zsh',             dest: '.config/zsh/options.zsh' }
    - { src: 'zsh/plugins.zsh',             dest: '.config/zsh/plugins.zsh' }


- name: "mabq - process templates"
  tags: users,mabq,dotfiles
  ansible.builtin.template:
    src: "users/mabq/{{ item.src }}"
    dest: "/home/mabq/{{ item.dest }}"
    owner: "mabq"
    group: "mabq"
    mode: "{{ item.mode | default('0600') }}"
  with_items:
    # tmux
    - { src: 'tmux/tmux.conf', dest: '.config/tmux/tmux.conf' }
    # zsh
    - { src: 'zsh/aliases.zsh', dest: '.config/zsh/aliases.zsh' }
    - { src: 'zsh/exports.zsh', dest: '.config/zsh/exports.zsh' }


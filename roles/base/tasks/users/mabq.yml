- name: mabq - include variables
  tags: users,mabq
  include_vars: users/mabq.yml

# ---

- name: "{{ username }} - setup account"
  tags: users,mabq
  block:
  - name: "{{ username }} - create group"
    ansible.builtin.group:
      name: "{{ username }}"
  - name: "{{ username }} - generate password hash"
    # `/etc/shadow` stores the password hash, never the password itself
    ansible.builtin.command: "openssl passwd -6 {{ password }}"
    register: password_hash
  - name: "{{ username }} - create user"
    ansible.builtin.user:
      name: "{{ username }}"
      group: "{{ username }}"
      # adm group: commonly used to give read access to protected logs. It has full read access to journal files
      # wheel group: commonly used to give privileges to perform administrative actions
      groups: adm,wheel
      password: "{{ password_hash.stdout }}"
      # there is no zsh yet, we need to create the user first
      shell: /bin/zsh
  - name: "{{ username }} - add sudoers file"
    #  https://wiki.archlinux.org/title/List_of_applications/Security#Privilege_elevation
    ansible.builtin.copy:
      src: users/{{ username }}/sudo/sudoers
      dest: /etc/sudoers.d/{{ username }}
      owner: root
      group: root
      mode: 0440

# --- 

- name: "{{ username }} - create config directories"
  tags: users,mabq,dotfiles
  file:
    path: /home/{{ username }}/{{ item.dir }}
    state: directory
    owner: {{ username }}
    group: {{ username }}
    mode: 0700
  with_items:
    - { dir: '/etc/zsh' }
    - { dir: '.bash' }
    - { dir: '.config' }
    - { dir: '.config/tmux' }
    - { dir: '.config/zsh' }
    - { dir: '.cache' }
    - { dir: '.cache/zsh' }
    # - { dir: '.config/htop' }
    - { dir: '.local' }
    - { dir: '.local/bin' }
    - { dir: '.ssh' }
    # - { dir: '.vim' }
    # - { dir: '.vim/autoload' }
    # - { dir: '.vim/bundle' }
    # - { dir: '.vim/colors' }
    # - { dir: '.vim/ftplugin' }

# ---

- name: "{{ username }} - add ssh public key to `~/.ssh/authorized_keys`"
  # by using a single key, this step authorizes each machine to access all other machines
  tags: users,mabq,dotfiles
  ansible.posix.authorized_key:
    user: "{{ username }}"
    key: "{{ item }}"
  with_file:
    - "users/{{ username }}/ssh/id_ed25519.pub"

- name: "{{ username }} - copy dotfiles"
  tags: users,mabq,dotfiles
  ansible.builtin.copy:
    src: "users/{{ username }}/{{ item.src }}"
    dest: "/home/{{ username }}/{{ item.dest }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "{{ item.mode }} | default('0600')"
  with_items:
    - { src: 'ssh/id_ed25519', dest: '.ssh/id_ed25519' }
    - { src: 'ssh/id_ed25519.pub', dest: '.ssh/id_ed25519.pub', mode: '0640' }
    - { src: 'git/gitconfig', dest: '.gitconfig' }
    - { src: 'tmux/tmux-sessionizer', dest: '.local/bin/tmux-sessionizer', mode: '0700' }
    - { src: 'zsh/.zshenv', dest: '.zshenv' }
    - { src: 'zsh/.zshrc', dest: '.config/zsh/.zshrc' }
    - { src: 'zsh/bindkey.zsh', dest: '.config/zsh/bindkey.zsh' }
    - { src: 'zsh/functions.zsh', dest: '.config/zsh/functions.zsh' }
    - { src: 'zsh/options.zsh', dest: '.config/zsh/options.zsh' }
    - { src: 'zsh/plugins.zsh', dest: '.config/zsh/plugins.zsh' }

- name: "{{ username }} - process templates"
  tags: users,mabq,dotfiles
  ansible.builtin.template:
    src: "users/{{ username }}/{{ item.src }}"
    dest: "/home/{{ username }}/{{ item.dest }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "{{ item.mode | default('0600') }}"
  with_items:
    - { src: 'tmux/tmux.conf', dest: '.config/tmux/tmux.conf' }
    - { src: 'zsh/aliases.zsh', dest: '.config/zsh/aliases.zsh' }
    - { src: 'zsh/exports.zsh', dest: '.config/zsh/exports.zsh' }


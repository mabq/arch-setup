---

- name: Include variables - mabq
  tags: users,mabq,variables
  include_vars: users/mabq.yml

  # -----------------------------------------------------------------------

- name: Create user - {{ name }}
  tags: users,mabq,create
  block:

  - name: Create group - {{ name }}
    ansible.builtin.group:
      name: "{{ name }}"

  - name: Create user - {{ name }}
    block:
    - name: Generate the password hash
      ansible.builtin.command: "openssl passwd -6 {{ password }}"
      register: password_hash
    - name: 
      ansible.builtin.user:
        name: "{{ name }}"
        group: "{{ name }}"
        groups: adm,wheel
        password: "{{ password_hash }}"
        shell: /bin/bash

  # -----------------------------------------------------------------------
    
- name: Add sudoers file - {{ name }}
  tags: users,mabq,sudoers
  ansible.builtin.copy:
    src: users/{{ name }}/sudoers
    dest: /etc/sudoers.d/{{ name }}
    owner: root
    group: root
    mode: 0440

  # -----------------------------------------------------------------------
    
- name: Configure ssh - {{ name }}
  tags: users,mabq,ssh
  block:

  - name: Ensure .ssh directory exists - {{ name }}
    ansible.builtin.file:
      path: "/home/{{ name }}/.ssh"
      state: directory
      owner: "{{ name }}"
      group: "{{ name }}"
      mode: 0700

  - name: Install ssh key - {{ name }}
    ansible.builtin.copy:
      src: "users/{{ name }}/ssh/{{ name }}"
      dest: "/home/{{ name }}/.ssh/{{ name }}"
      owner: "{{ name }}"
      group: "{{ name }}"
      mode: 0600

  - name: Install public ssh key - {{ name }}
    ansible.builtin.copy:
      src: "users/{{ name }}/ssh/{{ name }}.pub"
      dest: "/home/{{ name }}/.ssh/{{ name }}.pub"
      owner: "{{ name }}"
      group: "{{ name }}"
      mode: 0644

  - name: Add the public key as an authorized key
    # (the same key is used on all computers)
    ansible.posix.authorized_key:
      user: "{{ name }}"
      key: "{{ item }}"
    with_file:
      - "users/{{ name }}/ssh/{{ name }}.pub"

    # There is no need to create a config file, we will re-use the same key for everything and the default value of `AddKeysToAgent` is `yes`.


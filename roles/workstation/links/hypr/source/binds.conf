# Binds:
#   https://wiki.hyprland.org/Configuring/Binds
#   tip: use `xev` or `wev` to identify a key press

# Mod list:
#   SHIFT CAPS CTRL/CONTROL ALT MOD2 MOD3 SUPER/WIN/LOGO/MOD4 MOD5

# Essentials -------------------------------------------------------------------

bind = SUPER, return, exec, alacritty
bind = SUPER, backspace, exec, $HOME/.config/dmenu/dmenu-powermenu
bind = SUPER, space, exec, $HOME/.config/dmenu/dmenu-all
bind = SUPER, escape, exit, 


# Outputs ----------------------------------------------------------------------

# One monitor is enough, two are better, three are too much. In any case two
# medium size monitors offer a better workflow than one very big monitor.


# Workspaces -------------------------------------------------------------------

bind = SUPER, semicolon, workspace, previous

bind = SUPER, n, workspace, e+1
bind = SUPER, p, workspace, e-1

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
#   ...with mouse
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1


# Layouts ----------------------------------------------------------------------

binde = SUPER, right, resizeactive, 10 0
binde = SUPER, left, resizeactive, -10 0
binde = SUPER, up, resizeactive, 0 -10
binde = SUPER, down, resizeactive, 0 10
#   ...with mouse
bindm = SUPER, mouse:273, resizewindow


# Windows ----------------------------------------------------------------------

bind = SUPER, q, killactive, 

bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

bind = SUPER + SHIFT, h, movewindow, l
bind = SUPER + SHIFT, l, movewindow, r
bind = SUPER + SHIFT, k, movewindow, u
bind = SUPER + SHIFT, j, movewindow, d
#   ...with mouse
bindm = SUPER, mouse:272, movewindow

bind = SUPER, f, togglefloating,
bind = SUPER, f, centerwindow, 

bind = SUPER, z, fullscreen

bind = SUPER, o, cyclenext

bind = SUPER, g, togglegroup

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10


# Special workspaces -----------------------------------------------------------
#   use `hyprctl clients` to inspect window properties

#   special
bind = SUPER + SHIFT, minus, movetoworkspace, special
bind = SUPER, minus, togglespecialworkspace,

#   spotify
windowrulev2 = workspace special:music, class:(Spotify)
windowrulev2 = rounding 12, class:(Spotify)
windowrulev2 = bordersize 3, class:(Spotify)
windowrulev2 = opacity 0.9, class:(Spotify)
bind = SUPER, m, togglespecialworkspace, music

#   keepassxc
windowrulev2 = workspace special:secrets, class:(org.keepassxc.KeePassXC)
windowrulev2 = rounding 12, class:(org.keepassxc.KeePassXC)
windowrulev2 = bordersize 3, class:(org.keepassxc.KeePassXC)
windowrulev2 = opacity 1, class:(org.keepassxc.KeePassXC)
bind = SUPER, s, togglespecialworkspace, secrets


# Window rules -----------------------------------------------------------------
#   https://wiki.hyprland.org/Configuring/Window-Rules/

#   float all by default
windowrulev2 = float, class:(.)
#   except
windowrulev2 = tile, class:(Alacritty)
windowrulev2 = tile, class:(Brave-browser)


# Launch programs -----------------------------------------------------------

bind = SUPER, c, exec, $HOME/.config/rofi/scripts/calculator.sh
# bind = SUPER, x, exec, colorpicker
bind = SUPER + ALT, b, exec, brave
bind = SUPER + ALT, s, exec, $HOME/.local/bin/sony


# Media keys -------------------------------------------------------------------

binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bind  =, XF86AudioMute, exec, pamixer --toggle-mute
#bindsym XF86AudioRaiseVolume exec --no-startup-id pamixer --unmute pamixer --increase 1
#bindsym XF86AudioLowerVolume exec --no-startup-id pamixer --unmute pamixer --decrease 1

bind =, XF86AudioPrev, exec, playerctl previous
bind =, XF86AudioPlay, exec, playerctl play-pause
bind =, XF86AudioNext, exec, playerctl next

bind =, XF86Calculator, exec, $HOME/.config/rofi/scripts/calculator.sh
bind =, Print, exec, flameshot gui

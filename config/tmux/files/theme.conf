# Theme options ---
#   https://github.com/tmux/tmux/wiki/Getting-Started#list-of-style-and-format-options
#   Avoid italics, the linux console does not support them (reverse colors instead)

set -g status-justify "absolute-centre"  # center window labels
set -g status-style "bg={{ color_black_low }},fg={{ color_white_low }}"  # use fg for separators color

set -g status-left " #S "
# set -g status-left-style "fg={{ color_yellow }},italics"
set -g status-left-style "fg={{ color_yellow }}"
set -g status-left-length 100  # automatically trucated if space is required

set -g window-status-separator " "
# set -g window-status-format " #W "  # remove flags
set -g window-status-format " #I "  # remove flags
# set -g window-status-format " #I:#W#{?window_flags,#{window_flags}, } "
# set -g window-status-style "fg={{ color_white_low }}"  # default window style
# set -g window-status-current-format " #W "  # remove flags
set -g window-status-current-format " #I "  # remove flags
# set -g window-status-current-format " #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-current-style "fg={{ color_white_high }},bright"
set -g window-status-activity-style "fg={{ color_red }}"
set -g window-status-bell-style "fg={{ color_red }}"
set -g automatic-rename off  # do not let programs change the window name

set -g status-right "" # remove clock and hostname info

set -g pane-border-style "fg={{ color_black_high }}"
set -g pane-active-border-style "fg={{ color_yellow }}"

set -g message-style "bg={{ color_yellow }},fg={{ color_black_low }}"
# set -g message-command-style "bg={{ color_blue }},fg={{ color_black_low }}"  # not used with emacs-like keys

set -g mode-style "bg={{ color_highlight }},fg={{ color_white_high }}"  # selection style

set -g display-panes-colour "{{ color_red }}"  # inactive pane number color
set -g display-panes-active-colour "{{ color_blue }}"  # active pane number color


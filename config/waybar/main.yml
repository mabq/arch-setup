- tags: waybar
  block:

    - name: waybar - Install packages
      become: true
      community.general.pacman:
        state: latest
        name:
          - waybar      # Highly customizable Wayland bar for Sway and Wlroots based compositors

    - name: Create config files
      block:
      # - name: waybar - Create directories
      #   ansible.builtin.file:
      #     path: "{{ home }}/.config/waybar"
      #     owner: "{{ user }}"
      #     group: "{{ user }}"
      #     mode: '700'
      #     state: directory

      - name: waybar - Create link
        # link the whole directory, nothing sensible will ever be stored here
        ansible.builtin.file:
          src: "{{ repo_dir }}/config/waybar/files"
          path: "{{ home }}/.config/waybar"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: "0700"
          state: "link"


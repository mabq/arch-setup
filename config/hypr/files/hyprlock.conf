# Docs
#   https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

general {
    # - disables the loading bar on the bottom of the screen while hyprlock is booting up.
    # disable_loading_bar = false

    # - hides the cursor instead of making it visible
    # hide_cursor = false

    # - the amount of seconds for which the lockscreen will unlock on mouse movement.
    # grace = 0

    # - disables the fadein animation
    # no_fade_in = false

    # - disables the fadeout animation
    # no_fade_out = false

    # - skips validation when no password is provided
    # ignore_empty_input = false

    # - sets the pam module used for authentication. If the module isn’t found in /etc/pam.d, “su” will be used as a fallback	
    # pam_module = hyprlock

    # - sets if the text should be trimmed, useful to avoid trailing newline in commands output
    # text_trim = true
}


background {
    # leave empty for all monitors
    monitor =

    # If path is empty or missing, will use color. Otherwise, the image will be used.
    path = ~/projects/wallpapers/wallpapers/girl-smoking.jpg   # supports png, jpg, webp (no animations, though)
    color = rgba(30, 30, 46, 0.85)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    # blur_passes = 0 # 0 disables blurring
    # blur_size = 7
    # noise = 0.0117
    # contrast = 0.8916
    # brightness = 0.8172
    # vibrancy = 0.1696
    # vibrancy_darkness = 0.0
}


input-field {
    # leave empty for all monitors
    monitor =
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(118, 156, 239)
    inner_color = rgb(41, 45, 66, 1)
    font_color = rgb(186, 195, 238)
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Enter password</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgb(128, 208, 255)
    fail_color = rgb(247, 120, 143) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -20
    halign = center
    valign = center
}

- tags: tofi
  block:

    - name: Install packages from AUR
      tags: aur
      block:
        - name: hypr_tofi - Check if tofi is already installed
          ansible.builtin.command: "which tofi"
          register: which_tofi
          ignore_errors: true

        - name: hypr_tofi - Install tofi
          when: which_tofi.rc != 0
          # Tiny rofi / dmenu replacement for wlroots-based Wayland compositors
          ansible.builtin.shell: 'paru -S --skipreview tofi'

    - name: Create config files
      block:
      - name: hypr_tofi - Create directories
        ansible.builtin.file:
          path: "{{ home }}/.config/tofi/scripts"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: '700'
          state: directory

      - name: hypr_tofi - Create links
        # These links are created only to avoid hard-coding the path of the repository in configuration files.
        ansible.builtin.file:
          src: "{{ repo_dir }}/config/hypr_tofi/scripts/{{ item.name }}"
          path: "{{ home }}/.config/tofi/scripts/{{ item.name }}"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: "0700"
          state: "link"
        loop:
          - { name: "tofi_drun.sh" }
          - { name: "tofi_run.sh" }

      - name: hypr_tofi - Process templates
        tags: theme
        ansible.builtin.template:
          src: "files/{{ item.name }}"
          dest: "{{ home }}/.config/tofi/{{ item.name }}"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: '600'
        loop:
          - { name: "config" }


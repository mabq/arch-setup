- tags: nvim
  block:

    - name: nvim - Install packages
      become: true
      community.general.pacman:
        state: latest
        name:
          - neovim    # Fork of Vim aiming to improve user experience, plugins, and GUIs


    - name: nvim - Create config files
      block:
      - name: nvim - Create directory
        ansible.builtin.file:
          path: "{{ home }}/.config/nvim"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: '700'
          state: directory

      - name: nvim - Create links
        ansible.builtin.file:
          src: "{{ repo_dir }}/config/nvim/files/{{ item.name }}"
          path: "{{ home }}/.config/nvim/{{ item.name }}"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: "{{ item.mode }}"
          state: "link"
        loop:
          - { name: 'init.lua', mode: '600' }
          # link the directories, that way any plugin that you add will be added to the repo as well
          - { name: 'lua', mode: '700' }
          - { name: 'spell', mode: '700' }

- name: Change repository remote url (from https to ssh)
  # `ansible-pull` uses the http protocol to clone the repository, we 
  # need to change the remote url protocol, from https to ssh, in order 
  # to be able to push changes any changes made to linked files.
  ansible.builtin.replace:
    path: "{{ srcdir }}/.git/config"
    regexp: ^(\s*url\s*=\s*)https:\/\/(github\.com)\/(.+)
    replace: \1git@\2:\3

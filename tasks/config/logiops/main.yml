- tags: logiops
  block:

    - name: logiops - Install package from AUR
      tags: aur
      block:
        - name: logiops - Check if logiops is already installed
          ansible.builtin.command: "which logid"
          register: which_logid
          ignore_errors: true

        - name: logiops - Install logiops
          when: which_logid.rc != 0
          # An unofficial driver for Logitech HID++>2.0 mice and keyboard
          ansible.builtin.shell: 'paru -S --skipreview logiops'


    - name: Create config files
      block:
          # Put the config file in the `/etc` directory, not in the home
          # directory, otherwise you won't be able to manage the service
          # through systed.
        - name: logiops - Create links
          ansible.builtin.file:
            src: "{{ repo_dir }}/tasks/config/logiops/files/logid.cfg"
            path: "/etc/logid.cfg"
            owner: "root"
            group: "root"
            mode: '644'
            state: "link"


    - name: Enable it as a service
      block:
        - name: logiops - Start and enable it as a service
          # https://wiki.archlinux.org/title/SSH_keys#Start_ssh-agent_with_systemd_user
          # Requires `SSH_AUTH_LOCK` environment variable (see zsh config)
          environment:
            # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/systemd_service_module.html#parameter-scope
            XDG_RUNTIME_DIR: "{{ lookup('env', 'XDG_RUNTIME_DIR') }}"
          become: true
          ansible.builtin.systemd_service:
            name: "logid.service"
            state: "started"
            enabled: true
            scope: "system"



<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

    <!-- See https://wiki.archlinux.org/title/font_configuration#Alias -->
    <!-- https://www.reddit.com/r/archlinux/comments/9rhq1g/which_part_of_arch_decides_what_the_default_font/ -->

    <!-- Second option is fallback -->
    <!-- Use `pango-list` command to check the complete font name -->
    <!-- See link for differences between `Nerd Font`, `Nerd Font Mono` and `Nerd Font Propo` (https://github.com/ryanoasis/nerd-fonts/discussions/1103) -->

    <!-- After changing the configuration run `fc-match -a monospace | head` to verify your fallback font is set correctly -->

    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>CartographCF Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <alias>
        <family>serif</family>
        <prefer>
            <family>CartographCF Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <alias>
        <family>monospace</family>
        <prefer>
            <family>CartographCF Nerd Font Mono</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <alias>
        <family>monospace-double</family>
        <prefer>
            <family>CartographCF Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!-- For the Cartograph CF font in particular, the bold version
         of the font was picked as default, it was the first option
         of `fc-match -a monospace`.
         To make another version appear as the first option use 
         the following.
    -->
    <match target="pattern">
        <test name="family" compare="eq">
            <string>serif</string>
       </test>
        <edit name="style" mode="append">
            <string>Regular</string>
        </edit>
    </match>

    <match target="pattern">
        <test name="family" compare="eq">
            <string>sans-serif</string>
        </test>
        <edit name="style" mode="append">
            <string>Regular</string>
        </edit>
    </match>

    <match target="pattern">
        <test name="family" compare="eq">
            <string>monospace</string>
        </test>
        <edit name="style" mode="append">
            <string>Regular</string>
        </edit>
    </match>

    <match target="pattern">
        <test name="family" compare="eq">
            <string>monospace-double</string>
        </test>
        <edit name="style" mode="append">
            <string>Regular</string>
        </edit>
    </match>

</fontconfig>


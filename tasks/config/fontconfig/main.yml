- tags: fontconfig
  block:

    - name: Install required packages
      block:
        - name: fontconfig - Install packages from official repositories
          become: true
          community.general.pacman:
            state: latest
            name:
              - fontconfig        # Library for configuring and customizing font access
              - fzf               # Command-line fuzzy finder (required for fontpreview)
              - imagemagick       # An image viewing/manipulation program (required for fontpreview)

        - name: fontconfig - Install packages from AUR
          tags: aur
          block:
            - name: ueberzugpp
              # required for fontpreview
              block:
                - name: fontconfig - Check if ueberzugpp is already installed
                  ansible.builtin.command: "which ueberzugpp"
                  register: which_ueberzugpp
                  ignore_errors: true

                - name: fontconfig - Install ueberzugpp 
                  when: which_ueberzugpp.rc != 0
                  # Command line util which allows to display images in combination with X11 written in C++
                  ansible.builtin.shell: 'paru -S --skipreview ueberzugpp'


    - name: Create config files
      block:
      - name: fontconfig - Create directories
        ansible.builtin.file:
          path: "{{ home }}/.config/fontconfig"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: '700'
          state: directory

      - name: fontconfig - Create links
        ansible.builtin.file:
          src: "{{ repo_dir }}/tasks/config/fontconfig/files/{{ item.name }}"
          path: "{{ home }}/.config/fontconfig/{{ item.name }}"
          owner: "{{ user }}"
          group: "{{ user }}"
          mode: "{{ item.mode }}"
          state: "link"
        loop:
          - { name: "fonts.conf", mode: '600' }
          - { name: "fontpreview-ueberzug.sh", mode: '700' }


    - name: Get fonts
      # I cannot include propietary fonts in a public repo, all fonts should 
      # be stored in a private repository
      block:
        - name: Add ssh key passphrase to ssh-agent
          # Otherwise the cloning will fail
          block:
            - name: fontconfig - Start ssh-agent
              ansible.builtin.shell: "eval $(ssh-agent)"
                
            - name: fontconfig - Start ssh-agent
              ansible.builtin.shell: "echo {{ ssh_key_passphrase }} | ssh-add {{ home }}/.ssh/{{ ssh_key_name }}"

        - name: fontconfig - Clone the `arch-fonts` repository (private)
          ansible.builtin.git:
            repo: "git@github.com:mabq/arch-fonts.git"
            dest: "{{ home }}/projects/arch-fonts"
            clone: true
            update: true
            key_file: "{{ home }}/.ssh/{{ ssh_key_name }}"
            # this is the first time connecting to github via ssh, we must 
            # accept it's key to be automatically added to the `known_hosts`
            # file, otherwise the verification fails.
            accept_hostkey: true

        - name: fontconfig - Create link to the `fonts` directory
          become: true
          ansible.builtin.file:
            src: "{{ home }}/projects/arch-fonts/fonts"
            path: "/usr/local/share/fonts"
            owner: "{{ user }}"
            group: "{{ user }}"
            mode: '755'
            state: "link"


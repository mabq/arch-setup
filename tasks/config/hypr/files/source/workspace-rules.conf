# Workspace rules --------------------------------------------------------------
#   https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Autolaunch on numbered workspaces
workspace = 1, on-created-empty:alacritty
workspace = 2, on-created-empty:brave

# special
workspace = special, on-created-empty:alacritty --class alacritty-special

# special:music
workspace = special:music, on-created-empty:alacritty --class alacritty-music --command ncspot

# special:calc
workspace = special:calc, on-created-empty:alacritty --class alacritty-calc --command node

# special:secrets 
workspace = special:secrets, on-created-empty:keepassxc

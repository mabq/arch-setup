- hosts: all
  tags: always
  become: true
  pre_tasks:
    - name: System update
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_distribution == "Archlinux"

  # -----------------------------------------------------------------------

- hosts: all
  tags: base
  become: true
  roles:
    - base


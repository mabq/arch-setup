# --- Run pretasks ---

- hosts: all
  become: true
  tags: always
  pre_tasks:
  - name: Exit if not running Archlinux
    ansible.builtin.fail:
      msg: This host is not running Archlinux
    when: ansible_distribution != "Archlinux"
  # - name: Synchronize and update all packages
  #   community.general.pacman:
  #     update_cache: true
  #     upgrade: true
  - name: Load theme variables
    ansible.builtin.include_vars: 
      file: "./themes/{{ theme }}.yml"

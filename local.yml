# tasks to complete before running roles
- hosts: all
  become: true
  tags: always
  pre_tasks:
    - name: pre-tasks | skip if not Arch
      ansible.builtin.fail:
        msg: This host is not running Archlinux
      when: ansible_distribution != "Archlinux"
    - name: pre-tasks | update all packages
      community.general.pacman:
        update_cache: true
        upgrade: true
    - name: pre-tasks | load theme variables
      ansible.builtin.include_vars: 
        file: "./themes/{{theme}}.yml"

# run roles
- hosts: all
  tags: base
  become: true
  roles:
    - base


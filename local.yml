---
- hosts: localhost
  # tags: always
  become: true
  pre_tasks:
    - name: System update
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_distribution == "Archlinux"

- name: Pick a theme
  include_vars: "{{ playbook_dir }}/vars/rose-pine-dawn.yml"

- hosts: localhost
  tags: base
  become: true
  roles:
    - base


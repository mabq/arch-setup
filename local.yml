---
- hosts: all
  become: true
  pre_tasks:
    - name: System update
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_distribution == "Archlinux"
    - name: Pick a theme
      tags: always
      include_vars: "vars/themes/{{theme}}.yml"


# tasks to complete before running roles
- hosts: all
  become: true
  pre_tasks:
    - name: Pre-run | update all packages
      tags: always
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_distribution == "Archlinux"

# run roles
- hosts: all
  tags: base
  become: true
  roles:
    # Create users, create configuration files, install base packages
    - base

